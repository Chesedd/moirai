services:
  caddy:
    image: caddy:2-alpine
    container_name: moirai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  xray:
    image: teddysun/xray:latest
    container_name: moirai-xray
    restart: unless-stopped
    volumes:
      - /opt/moirai/secrets/xray-config.json:/etc/xray/config.json:ro

  bot:
    build: ../bot
    container_name: moirai-bot
    env_file: ../.env
    volumes:
      - /opt/moirai/secrets:/secrets:ro
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_started
      xray:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
